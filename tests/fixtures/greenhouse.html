<!-- Simplified Greenhouse application form fixture -->
<html lang="en">
<head>
  <title>Software Engineer – GreenCo | Greenhouse</title>
</head>
<body>
  <h1>Software Engineer</h1>
  <form id="application_form">
    <div>
      <label for="first_name">First Name <span>*</span></label>
      <input id="first_name" name="job_application[first_name]" type="text" autocomplete="given-name" required />
    </div>
    <div>
      <label for="last_name">Last Name <span>*</span></label>
      <input id="last_name" name="job_application[last_name]" type="text" autocomplete="family-name" required />
    </div>
    <div>
      <label for="email">Email Address <span>*</span></label>
      <input id="email" name="job_application[email]" type="email" autocomplete="email" required />
    </div>
    <div>
      <label for="phone">Phone Number</label>
      <input id="phone" name="job_application[phone]" type="tel" autocomplete="tel" />
    </div>
    <div>
      <label for="location">Location (City)</label>
      <input id="location" name="job_application[location]" type="text" placeholder="City, Country" />
    </div>
    <div>
      <label for="linkedin_profile">LinkedIn Profile</label>
      <input id="linkedin_profile" name="job_application[linkedin_profile]" type="url" />
    </div>
    <div>
      <label for="github">GitHub</label>
      <input id="github" name="job_application[github]" type="url" />
    </div>
    <div>
      <label for="website">Website</label>
      <input id="website" name="job_application[website]" type="url" autocomplete="url" />
    </div>
    <div>
      <label for="cover_letter">Cover Letter</label>
      <textarea id="cover_letter" name="job_application[cover_letter]" rows="6"></textarea>
    </div>
    <div>
      <label for="salary">Desired Salary</label>
      <input id="salary" name="job_application[salary]" type="text" placeholder="e.g. 100000" />
    </div>
    <div>
      <label for="resume">Resume/CV <span>*</span></label>
      <input id="resume" name="resume" type="file" required />
    </div>
  </form>
</body>
</html>
